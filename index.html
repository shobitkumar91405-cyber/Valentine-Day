<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Aakshi 💫</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Great+Vibes&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #2a001a, #14001a, #000814);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 10px solid transparent;
            animation: softGlowBorder 10s infinite alternate;
        }

        @keyframes softGlowBorder {
            0% { border-image: linear-gradient(45deg, #ff4d88, #c71585) 1; }
            50% { border-image: linear-gradient(45deg, #9d4edd, #d7a1f9) 1; }
            100% { border-image: linear-gradient(45deg, #ff4d88, #c71585) 1; }
        }

        .top-handle {
            position: absolute;
            top: 20px;
            width: 100%;
            font-weight: 600;
            color: #ffccdd;
            text-shadow: 0 0 12px #ff69b4;
            z-index: 100;
            font-size: 1.1rem;
            letter-spacing: 2.5px;
        }

        .page {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.7s ease;
            z-index: 10;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: #ffccdd;
            text-shadow: 0 0 18px #ff69b4, 0 0 35px #c71585;
            animation: textPulse 4s infinite alternate;
        }

        @keyframes textPulse {
            from { transform: scale(1); }
            to { transform: scale(1.04); }
        }

        p {
            font-size: 1.15rem;
            margin-bottom: 35px;
            line-height: 1.6;
            max-width: 88%;
            color: #f5e1e9;
        }

        .gif-container {
            width: 240px;
            height: 240px;
            margin-bottom: 30px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #ff99cc;
            box-shadow: 0 0 25px rgba(255,105,180,0.5);
            animation: gentleBeat 5s infinite;
        }

        @keyframes gentleBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            background: linear-gradient(135deg, #ff6699, #ff3366);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            margin: 12px;
            box-shadow: 0 0 20px rgba(255,51,102,0.6);
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255,51,102,0.9);
        }

        .btn.no-btn {
            background: linear-gradient(135deg, #6c757d, #495057);
            box-shadow: 0 0 15px rgba(108,117,125,0.6);
        }

        #yes-container {
            position: relative;
            width: 95%;
            min-height: 220px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 20px;
        }

        /* Background animations */
        #bg-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            bottom: -80px;
            font-size: 32px;
            animation: riseHeart linear infinite;
            opacity: 0.85;
            text-shadow: 0 0 12px #ff69b4;
        }

        @keyframes riseHeart {
            0% { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 0; }
            15% { opacity: 0.9; }
            85% { opacity: 0.9; }
            100% { transform: translateY(-140vh) rotate(720deg) scale(1.3); opacity: 0; }
        }

        .petal {
            position: absolute;
            bottom: -120px;
            width: 18px;
            height: 28px;
            background: linear-gradient(#ff3366, #ff99cc);
            clip-path: ellipse(50% 60% at 50% 40%);
            animation: fallPetal linear infinite;
            opacity: 0.75;
        }

        @keyframes fallPetal {
            0% { transform: translateY(0) rotate(0deg) translateX(0); }
            100% { transform: translateY(-130vh) rotate(1080deg) translateX(60vw); }
        }

        /* Regular twinkling stars */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px white, 0 0 15px #fffacd;
            animation: floatStar linear infinite, twinkle 1.5s infinite alternate;
            opacity: 0.9;
        }

        @keyframes floatStar {
            0% { transform: translateY(120vh) scale(0.4); opacity: 0; }
            10% { opacity: 0.9; }
            90% { opacity: 0.9; }
            100% { transform: translateY(-20vh) scale(1); opacity: 0; }
        }

        @keyframes twinkle {
            0% { opacity: 0.6; box-shadow: 0 0 8px white; }
            50% { opacity: 1; box-shadow: 0 0 20px #fffacd, 0 0 30px #ffd700; }
            100% { opacity: 0.6; box-shadow: 0 0 8px white; }
        }

        /* Shooting stars */
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), white, rgba(255,255,255,0.8));
            border-radius: 50%;
            box-shadow: 0 0 20px white, 0 0 40px #fffacd;
            transform: rotate(45deg);
            animation: shoot linear infinite;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes shoot {
            0% {
                top: -10%;
                left: 110%;
                opacity: 0;
                transform: translate(0, 0) rotate(30deg);
            }
            5% {
                opacity: 1;
            }
            30% {
                opacity: 1;
                transform: translate(-150vw, 150vh) rotate(45deg);
            }
            100% {
                opacity: 0;
                transform: translate(-180vw, 180vh) rotate(50deg);
            }
        }
    </style>
</head>
<body>

    <div class="top-handle">Made for Aakshi 🌸</div>

    <audio id="bg-music" loop>
        <source src="tere-liye.mp3" type="audio/mpeg">
    </audio>

    <div id="bg-container"></div>

    <div class="page active" id="page-1">
        <h1>Hi Aakshi! ✨</h1>
        <p>Ek chota sa surprise tumhare liye...</p>
        <button class="btn" onclick="nextPage(1)">Click Here</button>
    </div>

    <div class="page" id="page-2">
        <div class="gif-container">
            <img src="flower1.gif" alt="Flower 1">
        </div>
        <p>It was really nice meeting you today! 🌸</p>
        <button class="btn" onclick="nextPage(2)">Next</button>
    </div>

    <div class="page" id="page-3">
        <div class="gif-container">
            <img src="flower2.gif" alt="Flower 2">
        </div>
        <p>I hope your day was as awesome as your vibe. 🌷</p>
        <button class="btn" onclick="nextPage(3)">One more</button>
    </div>

    <div class="page" id="page-4">
        <div class="gif-container">
            <img src="flower3.gif" alt="Flower 3">
        </div>
        <h1>Aakshi ab se ham frnds?</h1>
        <div id="yes-container">
            <button class="btn" id="yes-main" onclick="sayYes()">Yes 😊</button>
            <button class="btn no-btn" id="no-btn" onclick="noThanks()">No 😔</button>
        </div>
    </div>

    <div class="page" id="page-5">
        <h1>nice to meet you aakshi have a nice day</h1>
        <p>🌙✨</p>
    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');
        const yesContainer = document.getElementById('yes-container');
        let yesButtons = 1;

        function nextPage(current) {
            if (current === 1) {
                bgMusic.play().catch(() => {});
            }
            
            document.getElementById(`page-${current}`).classList.remove('active');
            const nextPage = document.getElementById(`page-${current + 1}`);
            if (nextPage) {
                setTimeout(() => nextPage.classList.add('active'), 200);
            }
        }

        function sayYes() {
            document.getElementById('page-4').classList.remove('active');
            setTimeout(() => document.getElementById('page-5').classList.add('active'), 200);
        }

        function noThanks() {
            yesButtons += Math.floor(Math.random() * 5) + 4;
            if (yesButtons > 40) yesButtons = 40;

            yesContainer.innerHTML = '';

            for (let i = 0; i < yesButtons; i++) {
                const y = document.createElement('button');
                y.className = 'btn';
                y.textContent = 'Yes 😊';
                y.onclick = sayYes;
                yesContainer.appendChild(y);
            }

            const n = document.createElement('button');
            n.className = 'btn no-btn';
            n.textContent = 'No 😔';
            n.onclick = noThanks;
            yesContainer.appendChild(n);
        }

        function createBackground() {
            const container = document.getElementById('bg-container');
            const hearts = ['💖','❤️','💕','💗','✨'];

            // Hearts
            for (let i = 0; i < 22; i++) {
                const h = document.createElement('div');
                h.className = 'heart';
                h.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                h.style.left = Math.random() * 100 + 'vw';
                h.style.fontSize = (Math.random() * 24 + 20) + 'px';
                h.style.animationDuration = (Math.random() * 7 + 9) + 's';
                h.style.animationDelay = Math.random() * 14 + 's';
                container.appendChild(h);
            }

            // Rose petals
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 8 + 12) + 's';
                p.style.animationDelay = Math.random() * 18 + 's';
                container.appendChild(p);
            }

            // Regular twinkling stars
            for (let i = 0; i < 35; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 4 + 1.5;
                s.style.width = size + 'px';
                s.style.height = size + 'px';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.animationDuration = (Math.random() * 12 + 15) + 's';
                s.style.animationDelay = Math.random() * 20 + 's';
                s.style.opacity = Math.random() * 0.5 + 0.5;
                container.appendChild(s);
            }

            // Shooting stars (they appear randomly over time)
            for (let i = 0; i < 8; i++) {  // 8 shooting stars with different delays
                const ss = document.createElement('div');
                ss.className = 'shooting-star';
                ss.style.animationDelay = (Math.random() * 20 + i * 3) + 's'; // staggered start
                ss.style.animationDuration = (Math.random() * 1.5 + 1.2) + 's'; // fast streak
                // Slight variation in angle and length
                const angle = 30 + Math.random() * 30;
                ss.style.transform = `rotate(${angle}deg)`;
                ss.style.height = (50 + Math.random() * 40) + 'px';
                container.appendChild(ss);
            }
        }
        
        window.onload = createBackground;
    </script>
</body>
</html>
